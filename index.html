<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Streamer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 2px solid #ffc119;
        }
        .header h1 { font-size: 1.8rem; color: #ffc119; }
        .container { width: 100%; max-width: 900px; padding: 30px 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        .search-box input {
            flex: 1; padding: 12px 16px; border: 2px solid #333;
            border-radius: 8px; background: #1a1a2e; color: #fff;
            font-size: 1rem; outline: none; transition: border-color 0.3s;
        }
        .search-box input:focus { border-color: #ffc119; }
        .search-box input::placeholder { color: #666; }
        .search-box input[type="number"] { max-width: 100px; flex: 0.2; }
        .btn {
            padding: 12px 28px; background: #ffc119; color: #111;
            border: none; border-radius: 8px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { background: #e6ac00; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .player-container {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 12px; overflow: hidden; margin-bottom: 20px;
            display: none; border: 2px solid #222;
        }
        .player-container.active { display: block; }
        .player-container video { width: 100%; height: 100%; }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .server-bar {
            display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;
        }
        .server-btn {
            padding: 8px 16px; background: #1a1a2e; color: #aaa;
            border: 1px solid #333; border-radius: 6px; cursor: pointer;
            font-size: 0.85rem; transition: all 0.2s;
        }
        .server-btn:hover { border-color: #ffc119; color: #fff; }
        .server-btn.active { background: #ffc119; color: #111; border-color: #ffc119; }
        .info-box {
            background: #1a1a2e; border-radius: 12px; padding: 20px;
            display: none; border: 1px solid #333;
        }
        .info-box.active { display: block; }
        .info-box h3 { color: #ffc119; margin-bottom: 10px; }
        .info-box pre {
            background: #111; padding: 12px; border-radius: 8px;
            overflow-x: auto; font-size: 0.85rem; color: #aaa; word-break: break-all;
        }
        .error {
            background: #3d1111; border: 1px solid #ff4444; color: #ff6666;
            padding: 14px; border-radius: 8px; display: none; margin-bottom: 20px;
        }
        .error.active { display: block; }
        .loading { text-align: center; padding: 40px; display: none; }
        .loading.active { display: block; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top-color: #ffc119; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .search-wrapper { position: relative; flex: 1; }
        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #1a1a2e; border: 2px solid #333; border-top: none;
            border-radius: 0 0 8px 8px; max-height: 300px; overflow-y: auto;
            z-index: 100; display: none;
        }
        .suggestions.active { display: block; }
        .suggestion-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; cursor: pointer; transition: background 0.2s;
        }
        .suggestion-item:hover { background: #16213e; }
        .suggestion-item img { width: 36px; height: 50px; border-radius: 4px; object-fit: cover; }
        .suggestion-item .info { flex: 1; }
        .suggestion-item .info .name { font-size: 0.9rem; color: #fff; }
        .suggestion-item .info .detail { font-size: 0.75rem; color: #888; }
        .meta-box {
            background: #1a1a2e; border-radius: 12px; padding: 20px;
            display: none; border: 1px solid #333; margin-bottom: 20px;
        }
        .meta-box.active { display: flex; gap: 20px; }
        .meta-box img { width: 120px; border-radius: 8px; flex-shrink: 0; }
        .meta-box .meta-info { flex: 1; }
        .meta-box .meta-info h2 { color: #ffc119; margin-bottom: 6px; font-size: 1.2rem; }
        .meta-box .meta-info .genres { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .meta-box .meta-info .genres span {
            background: #16213e; padding: 3px 10px; border-radius: 12px;
            font-size: 0.75rem; color: #aaa; border: 1px solid #333;
        }
        .meta-box .meta-info .desc {
            font-size: 0.85rem; color: #aaa; line-height: 1.5;
            max-height: 80px; overflow-y: auto;
        }
        .meta-box .meta-info .stats { margin-top: 8px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
    <div class="header"><h1>Anime Streamer</h1></div>
    <div class="container">
        <div class="search-box">
            <div class="search-wrapper">
                <input type="text" id="title" placeholder="Anime title (e.g. One Piece)" value="One Piece" autocomplete="off">
                <div class="suggestions" id="suggestions"></div>
            </div>
            <input type="number" id="episode" placeholder="Ep" value="1" min="1">
            <select id="source" class="btn" style="background:#1a1a2e;color:#ffc119;border:2px solid #333;">
                <option value="auto">Auto</option>
                <option value="anilist">AniList (HD Embed)</option>
                <option value="4animo">4Animo (HD Embed)</option>
                <option value="anitaku">Anitaku (M3U8)</option>
                <option value="gogoanime">Gogoanime (Sub/Dub)</option>
            </select>
            <button class="btn" id="searchBtn" onclick="fetchStream()">Stream</button>
        </div>
        <div class="error" id="error"></div>
        <div class="loading" id="loading"><div class="spinner"></div><p>Loading stream...</p></div>
        <div class="meta-box" id="metaBox">
            <img id="metaCover" src="" alt="">
            <div class="meta-info">
                <h2 id="metaTitle"></h2>
                <div class="genres" id="metaGenres"></div>
                <div class="desc" id="metaDesc"></div>
                <div class="stats" id="metaStats"></div>
            </div>
        </div>
        <div class="server-bar" id="serverBar"></div>
        <div class="player-container" id="player"></div>
        <div class="info-box" id="infoBox">
            <h3>Stream Info</h3>
            <pre id="streamInfo"></pre>
        </div>
    </div>
    <script>
        let hlsInstance = null;
        let streamData = null;
        let searchTimeout = null;

        async function fetchSuggestions(query) {
            const box = document.getElementById('suggestions');
            if (!query || query.length < 2) { box.classList.remove('active'); return; }
            try {
                const source = document.getElementById('source').value;
                const res = await fetch('/search?q=' + encodeURIComponent(query) + '&source=' + source);
                const data = await res.json();
                if (!data.results || data.results.length === 0) { box.classList.remove('active'); return; }
                box.innerHTML = '';
                data.results.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `
                        <img src="${item.cover || ''}" onerror="this.style.display='none'">
                        <div class="info">
                            <div class="name">${item.title}</div>
                            <div class="detail">${item.format || ''} ${item.episodes ? item.episodes + ' eps' : ''} ${item.score ? '★ ' + item.score + '%' : ''} <span style="color:${(item.source || 'anilist') === 'anitaku' ? '#ff6b6b' : '#7c5cfc'}">${(item.source || 'anilist') === 'anitaku' ? 'Anitaku' : 'AniList'}</span></div>
                        </div>
                    `;
                    div.onclick = () => {
                        document.getElementById('title').value = item.title;
                        box.classList.remove('active');
                        fetchStream();
                    };
                    box.appendChild(div);
                });
                box.classList.add('active');
            } catch(e) {}
        }

        function showMeta(meta) {
            const box = document.getElementById('metaBox');
            if (!meta) { box.classList.remove('active'); return; }
            document.getElementById('metaCover').src = meta.cover || '';
            document.getElementById('metaTitle').textContent = meta.title_romaji || meta.title || '';
            if (meta.title_native) document.getElementById('metaTitle').textContent += ' (' + meta.title_native + ')';
            const genresDiv = document.getElementById('metaGenres');
            genresDiv.innerHTML = '';
            (meta.genres || []).forEach(g => {
                const s = document.createElement('span');
                s.textContent = g;
                genresDiv.appendChild(s);
            });
            document.getElementById('metaDesc').textContent = meta.description || '';
            let stats = [];
            if (meta.score) stats.push('★ ' + meta.score + '%');
            if (meta.episodes) stats.push(meta.episodes + ' episodes');
            if (meta.duration) stats.push(meta.duration + ' min/ep');
            if (meta.status) stats.push(meta.status);
            if (meta.season && meta.season_year) stats.push(meta.season.charAt(0) + meta.season.slice(1).toLowerCase() + ' ' + meta.season_year);
            document.getElementById('metaStats').textContent = stats.join(' · ');
            box.classList.add('active');
        }

        async function fetchStream() {
            const title = document.getElementById('title').value.trim();
            const episode = parseInt(document.getElementById('episode').value) || 1;
            if (!title) return;

            document.getElementById('error').classList.remove('active');
            document.getElementById('player').classList.remove('active');
            document.getElementById('infoBox').classList.remove('active');
            document.getElementById('metaBox').classList.remove('active');
            document.getElementById('serverBar').innerHTML = '';
            document.getElementById('loading').classList.add('active');
            document.getElementById('searchBtn').disabled = true;

            try {
                const source = document.getElementById('source').value;
                const res = await fetch('/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, episode, source })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed to fetch');

                streamData = data;

                showMeta(data.meta);

                if (data.master_url) {
                    loadHlsPlayer(data.master_url);
                } else if (data.embed_url) {
                    loadIframePlayer(data.embed_url);
                }

                if (data.servers && data.servers.length > 1) {
                    renderServers(data.servers);
                }

                document.getElementById('streamInfo').textContent =
                    `${data.anime} - Episode ${data.episode} [${data.source}]\n` +
                    (data.master_url ? `HLS: ${data.master_url}` : `Embed: ${data.embed_url}`) +
                    (data.qualities?.length ? `\nQualities: ${data.qualities.map(q => q.resolution).join(', ')}` : '') +
                    (data.all_sources?.length ? `\nSources: ${data.all_sources.map(s => s.source + (s.has_m3u8 ? ' (m3u8)' : ' (iframe)')).join(', ')}` : '');
                document.getElementById('infoBox').classList.add('active');
            } catch (err) {
                document.getElementById('error').textContent = err.message;
                document.getElementById('error').classList.add('active');
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('searchBtn').disabled = false;
            }
        }

        function loadHlsPlayer(url) {
            const playerDiv = document.getElementById('player');
            playerDiv.innerHTML = '';
            playerDiv.classList.add('active');

            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            playerDiv.appendChild(video);

            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
                    const levels = data.levels.map(l => `${l.height}p`).join(', ');
                    console.log('Available qualities:', levels);
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }

        function loadIframePlayer(url) {
            const playerDiv = document.getElementById('player');
            playerDiv.innerHTML = '';
            playerDiv.classList.add('active');
            const iframe = document.createElement('iframe');
            iframe.src = '/proxy?url=' + encodeURIComponent(url);
            iframe.allow = 'autoplay; fullscreen; picture-in-picture';
            playerDiv.appendChild(iframe);
        }

        function renderServers(servers) {
            const bar = document.getElementById('serverBar');
            bar.innerHTML = '';
            servers.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn' + (i === 0 ? ' active' : '');
                btn.textContent = s.name;
                btn.onclick = () => {
                    bar.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadIframePlayer(s.url);
                };
                bar.appendChild(btn);
            });
        }

        document.getElementById('title').addEventListener('keypress', e => { if (e.key === 'Enter') fetchStream(); });
        document.getElementById('episode').addEventListener('keypress', e => { if (e.key === 'Enter') fetchStream(); });
        document.getElementById('title').addEventListener('input', e => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => fetchSuggestions(e.target.value), 300);
        });
        document.addEventListener('click', e => {
            if (!e.target.closest('.search-wrapper')) document.getElementById('suggestions').classList.remove('active');
        });
        document.getElementById('source').addEventListener('change', () => {
            const q = document.getElementById('title').value.trim();
            if (q.length >= 2) fetchSuggestions(q);
        });
    </script>
</body>
</html>
