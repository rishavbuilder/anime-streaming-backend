<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waifu — Anime Streamer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080b14;
            --bg-card: #0f1320;
            --bg-elevated: #161b2e;
            --bg-input: #111628;
            --accent: #e84057;
            --accent-glow: rgba(232, 64, 87, 0.12);
            --accent-hover: #f05068;
            --text-primary: #e8eaf0;
            --text-secondary: #8b92a8;
            --text-muted: #4a5168;
            --border: #1c2236;
            --border-focus: #2a3352;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-display: 'Space Grotesk', system-ui, sans-serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <div class="header-logo">W</div>
            <div>
                <div class="header-title">Waifu</div>
                <div class="header-sub">7 SOURCES</div>
            </div>
        </div>
    </header>
    <main class="container">
        <section class="player-section">
            <div class="player-wrapper" id="player"></div>
            <div class="now-playing" id="nowPlaying">
                <img class="now-playing-cover" id="npCover" src="" alt="">
                <div class="now-playing-info">
                    <div class="now-playing-title" id="npTitle"></div>
                    <div class="now-playing-meta">
                        <span id="npEpisode"></span>
                        <span class="source-tag" id="npSource"></span>
                    </div>
                </div>
            </div>
            <div class="server-bar" id="serverBar"></div>
            <div class="quality-bar" id="qualityBar"></div>
        </section>
        <section class="search-section">
            <div class="search-row">
                <div class="search-input-wrap">
                    <input class="search-input" type="text" id="title" placeholder="Search anime..." value="One Piece" autocomplete="off">
                    <div class="suggestions" id="suggestions"></div>
                </div>
                <input class="episode-input" type="number" id="episode" placeholder="Ep" value="1" min="1">
                <select class="source-select" id="source">
                    <option value="auto">Auto</option>
                    <option value="anilist">AniList</option>
                    <option value="4animo">4Animo</option>
                    <option value="anitaku">Anitaku</option>
                    <option value="gogoanime">Gogoanime</option>
                    <option value="kickassanime">KickAss</option>
                    <option value="animekai">AnimeKai</option>
                    <option value="watchhentai">WatchHentai</option>
                </select>
                <button class="play-btn" id="searchBtn" onclick="fetchStream()">Play</button>
            </div>
            <div class="error-msg" id="error"></div>
            <div class="loading-state" id="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Finding stream...</div>
            </div>
        </section>
        <section class="browser-section">
            <div class="browser-header">
                <div class="browser-title">Browse</div>
                <div class="browser-count" id="browserCount"></div>
            </div>
            <div class="source-tabs" id="sourceTabs">
                <button class="source-tab" data-src="all"><span class="tab-dot" style="background:#e84057"></span>All Library</button>
                <button class="source-tab active" data-src="anilist"><span class="tab-dot" style="background:#7c5cfc"></span>AniList</button>
                <button class="source-tab" data-src="4animo"><span class="tab-dot" style="background:#00d4ff"></span>4Animo</button>
                <button class="source-tab" data-src="anitaku"><span class="tab-dot" style="background:#ff6b6b"></span>Anitaku</button>
                <button class="source-tab" data-src="gogoanime"><span class="tab-dot" style="background:#4ecdc4"></span>Gogoanime</button>
                <button class="source-tab" data-src="kickassanime"><span class="tab-dot" style="background:#ff69b4"></span>KickAss</button>
                <button class="source-tab" data-src="animekai"><span class="tab-dot" style="background:#ffa500"></span>AnimeKai</button>
                <button class="source-tab" data-src="watchhentai"><span class="tab-dot" style="background:#e84057"></span>WatchHentai</button>
            </div>
            <div class="browse-row">
                <input class="browse-input" type="text" id="browseQuery" placeholder="Search this source..." autocomplete="off">
                <button class="browse-btn" id="browseBtn" onclick="browseSource()">Search</button>
            </div>
            <div id="trendingSection" style="display:none;">
                <div class="card-grid" id="trendingGrid"></div>
            </div>
            <div id="searchResults" style="display:none;">
                <div class="card-grid" id="browseGrid"></div>
            </div>
            <div class="card-grid" id="browseGridDefault">
                <div class="grid-empty">
                    <div class="grid-empty-icon">▶</div>
                    <div class="grid-empty-text">Pick a source to start browsing</div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
